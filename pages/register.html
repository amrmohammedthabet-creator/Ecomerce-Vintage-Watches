<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../styles/login-regestraion.css">  
</head>
<body>
    <div class="parent-log">

        <navbar class="navbarlog">
     <h1>Sign Up</h1>
        </navbar>
 

<main class="main-log"> 
<!-- داخل الفورم في صفحة التسجيل -->
<form class="frm-log">
  <div class="usname"> 
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
  </div>
  
  <div class="usname"> 
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>
  </div>
  
  <div class="pass"> 
    <label for="password">Password</label> 
    <input type="password" id="password" placeholder="Enter your password" autocomplete="off" required>
  </div>

  <div class="pass"> 
    <label for="Confirm-password">Confirm Password</label> 
    <input type="password" id="Confirm-password" placeholder="Confirm your password" autocomplete="off" required>
  </div>

  <div class="submit-login">
    <button type="submit">Register</button>
  </div>
</form>
<p class="already-count">
  Already have an account? <a href="login.html">Login</a>
</p>
</main>

<footer class="footer-log">
    <p style="text-align: center; ">Or Sign Up Using</p>
    <br>
    <div class="social">
    <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
    <a href="https://x.com/"><i class="fa-brands fa-x"></i></a>
    <a href="https://www.gmail.com/"><i class="fa-brands fa-google"></i></a>
    </div>
    </footer>
    </div>
<script src="../js/regestarion.js"></script>
  
</body>
</html>
