<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmileShop</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
  <link rel="stylesheet" href="../styles/login-regestraion.css"/>
</head>
<body>
  <div class="parent-log">
    <navbar class="navbarlog">
      <h1>Login</h1>
    </navbar>

    <main class="main-log"> 
      <form class="frm-log">
        <div class="usname"> 
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>
        </div>
        
        <div class="pass"> 
          <label for="password">Password</label> 
          <input type="password" id="password" placeholder="Enter your password" autocomplete="off" required>
        </div>

        <div class="submit-login">
          <button type="submit">Login</button>
        </div>
      </form>
    </main>

    <footer class="footer-log">
      <p style="text-align:center;">Or Sign Up Using</p>
      <br>
      <div class="social">
        <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
        <a href="https://x.com/"><i class="fa-brands fa-x"></i></a>
        <a href="https://www.gmail.com/"><i class="fa-brands fa-google"></i></a>
      </div>
      <p style="text-align:center; margin-top:15px;">
        Don't have an account? <a href="register.html">Sign Up</a>
      </p>
    </footer>
  </div>

  
  <script src="../js/login.js"></script>
</body>
</html>
